<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"/><title>BusETA 데이터 플로우</title>
<style>* { margin:0; padding:0; box-sizing:border-box; } html,body { width:1920px; height:1080px; background:#f0f4f8; overflow:hidden; font-family:"Malgun Gothic","Segoe UI",sans-serif; }</style>
</head>
<body>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#f97316"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#a855f7"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- 전체 배경 -->
  <rect width="1920" height="1080" fill="#f0f4f8"/>

  <!-- 제목 영역 -->
  <rect x="0" y="0" width="1920" height="80" fill="#ffffff" filter="url(#shadow)"/>
  <text x="960" y="32" text-anchor="middle" fill="#1e293b" font-size="26" font-weight="700">BusETA 앱 — 데이터 흐름 한눈에 보기</text>
  <text x="960" y="62" text-anchor="middle" fill="#64748b" font-size="16">내가 앱에서 버튼 하나 누를 때, 뒤에서 어떤 일이 일어나는가</text>

  <!-- ═══ 좌측 패널: 버스 정보 조회 ═══ -->
  <rect x="30" y="96" width="920" height="960" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <!-- 패널 헤더 -->
  <rect x="30" y="96" width="920" height="64" rx="24" fill="#dbeafe"/>
  <rect x="30" y="136" width="920" height="24" fill="#dbeafe"/>
  <text x="490" y="136" text-anchor="middle" fill="#1d4ed8" font-size="20" font-weight="700">🚌  버스 정보를 볼 때</text>
  <text x="490" y="158" text-anchor="middle" fill="#3b82f6" font-size="13">지도·홈 화면에서 버스를 확인하는 과정</text>

  <!-- STEP 1: 사용자 -->
  <rect x="340" y="198" width="300" height="72" rx="16" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="490" y="227" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">👤  나 (사용자)</text>
  <text x="490" y="252" text-anchor="middle" fill="#bfdbfe" font-size="13">지도 또는 홈 화면 탭</text>
  <line x1="490" y1="272" x2="490" y2="308" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="652" y="294" text-anchor="start" fill="#64748b" font-size="12" font-style="italic">① 앱 화면을 연다</text>

  <!-- STEP 2: 위치 파악 -->
  <rect x="340" y="310" width="300" height="72" rx="16" fill="#0ea5e9" filter="url(#shadow)"/>
  <text x="490" y="340" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">📍  내 위치 파악</text>
  <text x="490" y="362" text-anchor="middle" fill="#e0f2fe" font-size="12">스마트폰 GPS 사용</text>
  <line x1="490" y1="384" x2="490" y2="420" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="652" y="406" text-anchor="start" fill="#64748b" font-size="12" font-style="italic">② GPS로 현재 좌표를 얻음</text>

  <!-- STEP 3: 정류소 찾기 -->
  <rect x="340" y="422" width="300" height="72" rx="16" fill="#06b6d4" filter="url(#shadow)"/>
  <text x="490" y="452" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">🏩  근처 정류소 검색</text>
  <text x="490" y="474" text-anchor="middle" fill="#cffafe" font-size="12">좌표로 주변 정류소 목록 요청</text>
  <line x1="490" y1="496" x2="490" y2="532" stroke="#06b6d4" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="652" y="518" text-anchor="start" fill="#64748b" font-size="12" font-style="italic">③ 근처 정류소 알려줘</text>

  <!-- STEP 4 갈림 -->
  <rect x="340" y="534" width="300" height="58" rx="16" fill="#f97316" filter="url(#shadow)"/>
  <text x="490" y="558" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">🌐  경기도 버스 서버 요청</text>
  <text x="490" y="578" text-anchor="middle" fill="#fed7aa" font-size="12">공공데이터 API (무료)</text>

  <!-- 서버에서 두 가지 데이터 -->
  <line x1="380" y1="594" x2="200" y2="640" stroke="#f97316" stroke-width="2" marker-end="url(#arr-orange)"/>
  <line x1="600" y1="594" x2="760" y2="640" stroke="#f97316" stroke-width="2" marker-end="url(#arr-orange)"/>

  <rect x="80" y="642" width="260" height="72" rx="16" fill="#16a34a" filter="url(#shadow)"/>
  <text x="210" y="672" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">🕐  도착 예정 시간</text>
  <text x="210" y="694" text-anchor="middle" fill="#bbf7d0" font-size="12">"3분 후 도착" 등 표시</text>

  <rect x="610" y="642" width="260" height="72" rx="16" fill="#15803d" filter="url(#shadow)"/>
  <text x="740" y="672" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">📍  버스 현재 위치</text>
  <text x="740" y="694" text-anchor="middle" fill="#bbf7d0" font-size="12">지도에 버스 핀 표시</text>
  <text x="70" y="730" text-anchor="start" fill="#64748b" font-size="12" font-style="italic">④ 두 가지 정보를 동시에 받아옴</text>

  <!-- 결과 합치기 -->
  <line x1="210" y1="716" x2="400" y2="774" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="740" y1="716" x2="580" y2="774" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="290" y="776" width="400" height="72" rx="16" fill="#166534" filter="url(#shadow)"/>
  <text x="490" y="806" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">📱  앱 화면에 결과 표시</text>
  <text x="490" y="828" text-anchor="middle" fill="#bbf7d0" font-size="13">버스 도착시간 + 지도 위 버스 위치</text>
  <text x="708" y="860" text-anchor="start" fill="#64748b" font-size="12" font-style="italic">⑤ 사용자 화면에 바로 보여줌</text>

  <!-- 결과 설명 박스 -->
  <rect x="80" y="876" width="840" height="64" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="490" y="903" text-anchor="middle" fill="#166534" font-size="14" font-weight="700">💡 사용자는 버튼 하나로 실시간 버스 정보를 확인합니다</text>
  <text x="490" y="925" text-anchor="middle" fill="#16a34a" font-size="12">앱이 자동으로 GPS 위치 → 정류소 검색 → 도착시간·버스위치 조회까지 처리</text>

  <!-- ═══ 우측 패널: 소셜 로그인 ═══ -->
  <rect x="970" y="96" width="920" height="960" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="970" y="96" width="920" height="64" rx="24" fill="#ede9fe"/>
  <rect x="970" y="136" width="920" height="24" fill="#ede9fe"/>
  <text x="1430" y="136" text-anchor="middle" fill="#6d28d9" font-size="20" font-weight="700">🔐  로그인을 할 때</text>
  <text x="1430" y="158" text-anchor="middle" fill="#7c3aed" font-size="13">소셜 계정으로 로그인하는 과정</text>

  <!-- 사용자 -->
  <rect x="1280" y="198" width="300" height="72" rx="16" fill="#6d28d9" filter="url(#shadow)"/>
  <text x="1430" y="227" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">👤  나 (사용자)</text>
  <text x="1430" y="252" text-anchor="middle" fill="#ddd6fe" font-size="13">로그인 화면에서 버튼 선택</text>
  <line x1="1430" y1="272" x2="1430" y2="308" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="1592" y="294" text-anchor="start" fill="#64748b" font-size="12" font-style="italic">① 카카오·구글·네이버 선택</text>

  <!-- 로그인 화면 -->
  <rect x="1280" y="310" width="300" height="72" rx="16" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="1430" y="340" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">📲  앱 로그인 화면</text>
  <text x="1430" y="362" text-anchor="middle" fill="#ede9fe" font-size="12">선택한 소셜 서비스로 연결</text>

  <!-- 세 갈래 -->
  <line x1="1330" y1="384" x2="1090" y2="432" stroke="#a855f7" stroke-width="2" marker-end="url(#arr-purple)"/>
  <line x1="1430" y1="384" x2="1430" y2="432" stroke="#a855f7" stroke-width="2" marker-end="url(#arr-purple)"/>
  <line x1="1530" y1="384" x2="1760" y2="432" stroke="#a855f7" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="1680" y="392" text-anchor="start" fill="#64748b" font-size="12" font-style="italic">② 소셜 앱/페이지 실행</text>

  <!-- 카카오 -->
  <rect x="990" y="434" width="200" height="80" rx="14" fill="#FEE500" filter="url(#shadow)"/>
  <text x="1090" y="466" text-anchor="middle" fill="#3C1E1E" font-size="15" font-weight="700">🟡 카카오</text>
  <text x="1090" y="488" text-anchor="middle" fill="#3C1E1E" font-size="12">카카오 계정으로</text>
  <text x="1090" y="506" text-anchor="middle" fill="#3C1E1E" font-size="12">본인 인증</text>

  <!-- 구글 -->
  <rect x="1330" y="434" width="200" height="80" rx="14" fill="#ffffff" stroke="#dadce0" stroke-width="2" filter="url(#shadow)"/>
  <text x="1430" y="466" text-anchor="middle" fill="#3c4043" font-size="15" font-weight="700">🔵 구글</text>
  <text x="1430" y="488" text-anchor="middle" fill="#5f6368" font-size="12">구글 계정으로</text>
  <text x="1430" y="506" text-anchor="middle" fill="#5f6368" font-size="12">본인 인증</text>

  <!-- 네이버 -->
  <rect x="1670" y="434" width="200" height="80" rx="14" fill="#03C75A" filter="url(#shadow)"/>
  <text x="1770" y="466" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">🟢 네이버</text>
  <text x="1770" y="488" text-anchor="middle" fill="#ffffff" font-size="12">네이버 계정으로</text>
  <text x="1770" y="506" text-anchor="middle" fill="#ffffff" font-size="12">본인 인증</text>

  <text x="1592" y="548" text-anchor="start" fill="#64748b" font-size="12" font-style="italic">③ 서버 본인 확인 후 OK 전송</text>

  <!-- 화살표 아래로 -->
  <line x1="1090" y1="516" x2="1090" y2="582" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="1430" y1="516" x2="1430" y2="582" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="1770" y1="516" x2="1770" y2="582" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 인증 완료 -->
  <rect x="990" y="584" width="200" height="64" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="1090" y="610" text-anchor="middle" fill="#475569" font-size="13" font-weight="700">✅ 인증 완료</text>
  <text x="1090" y="632" text-anchor="middle" fill="#64748b" font-size="11">토큰 발급</text>

  <rect x="1330" y="584" width="200" height="64" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="1430" y="610" text-anchor="middle" fill="#475569" font-size="13" font-weight="700">✅ 인증 완료</text>
  <text x="1430" y="632" text-anchor="middle" fill="#64748b" font-size="11">토큰 발급</text>

  <rect x="1670" y="584" width="200" height="64" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="1770" y="610" text-anchor="middle" fill="#475569" font-size="13" font-weight="700">✅ 인증 완료</text>
  <text x="1770" y="632" text-anchor="middle" fill="#64748b" font-size="11">토큰 발급</text>

  <!-- 합류 -->
  <line x1="1090" y1="650" x2="1330" y2="718" stroke="#a855f7" stroke-width="2" marker-end="url(#arr-purple)"/>
  <line x1="1430" y1="650" x2="1430" y2="718" stroke="#a855f7" stroke-width="2" marker-end="url(#arr-purple)"/>
  <line x1="1770" y1="650" x2="1530" y2="718" stroke="#a855f7" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="1680" y="690" text-anchor="start" fill="#64748b" font-size="12" font-style="italic">④ 로그인 정보 폰에 저장</text>

  <!-- 저장 -->
  <rect x="1230" y="720" width="400" height="72" rx="16" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="1430" y="750" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">💾  로그인 정보 폰에 저장</text>
  <text x="1430" y="773" text-anchor="middle" fill="#ddd6fe" font-size="12">앱을 껐다 켜도 로그인 유지</text>

  <line x1="1430" y1="794" x2="1430" y2="830" stroke="#a855f7" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="1680" y="815" text-anchor="start" fill="#64748b" font-size="12" font-style="italic">⑤ 로그인 완료</text>

  <!-- 완료 -->
  <rect x="1230" y="832" width="400" height="72" rx="16" fill="#6d28d9" filter="url(#shadow)"/>
  <text x="1430" y="862" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">🎉  로그인 완료!</text>
  <text x="1430" y="884" text-anchor="middle" fill="#ddd6fe" font-size="13">메인 화면으로 이동</text>

  <!-- 결과 설명 박스 -->
  <rect x="1020" y="928" width="820" height="64" rx="14" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="1430" y="955" text-anchor="middle" fill="#6d28d9" font-size="14" font-weight="700">💡 한 번 로그인하면 다음 실행부터 자동으로 로그인됩니다</text>
  <text x="1430" y="977" text-anchor="middle" fill="#7c3aed" font-size="12">카카오·구글·네이버 서버가 본인을 확인해주면 앱이 그 정보를 기억</text>

  <!-- 하단 여백 장식선 -->
  <line x1="30" y1="1064" x2="1890" y2="1064" stroke="#e2e8f0" stroke-width="1"/>
  <text x="960" y="1075" text-anchor="middle" fill="#94a3b8" font-size="11">BusETA — 경기도 버스 도착 정보 앱</text>
</svg>
</body>
</html>
