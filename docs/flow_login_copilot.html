<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>BusETA Login Flow Presentation</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:960px;
  height:1080px;
  overflow:hidden;
  background:#f6f1fb;
  font-family:"Malgun Gothic","Segoe UI",sans-serif;
}
</style>
</head>
<body>
<svg width="960" height="1080" viewBox="0 0 960 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcfaff"/>
      <stop offset="100%" stop-color="#f5efff"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#9333ea"/>
    </marker>
  </defs>

  <rect width="960" height="1080" fill="url(#bg)"/>
  <circle cx="124" cy="140" r="98" fill="#e9d5ff" opacity="0.75"/>
  <circle cx="858" cy="940" r="126" fill="#fbcfe8" opacity="0.4"/>

  <rect x="48" y="42" width="864" height="108" rx="32" fill="#ffffff" filter="url(#shadow)"/>
  <text x="480" y="88" text-anchor="middle" fill="#0f172a" font-size="30" font-weight="700">소셜 로그인 흐름</text>
  <text x="480" y="122" text-anchor="middle" fill="#475569" font-size="16">발표용 세로 구성 | 인증과 세션 저장만 분리</text>

  <rect x="72" y="182" width="816" height="820" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="72" y="182" width="816" height="88" rx="34" fill="url(#head)"/>
  <text x="480" y="234" text-anchor="middle" fill="#ffffff" font-size="27" font-weight="700">로그인 선택부터 자동 로그인 유지까지</text>

  <rect x="282" y="312" width="396" height="88" rx="28" fill="#faf5ff" stroke="#d8b4fe" stroke-width="2"/>
  <text x="480" y="350" text-anchor="middle" fill="#0f172a" font-size="24" font-weight="700">1. 로그인 버튼 선택</text>
  <text x="480" y="378" text-anchor="middle" fill="#334155" font-size="15">카카오, 구글, 네이버 중 하나 선택</text>
  <line x1="480" y1="400" x2="480" y2="454" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="664" y="434" text-anchor="start" fill="#7e22ce" font-size="15" font-weight="700">인증 페이지 연결</text>

  <rect x="282" y="470" width="396" height="88" rx="28" fill="#ffffff" stroke="#e9d5ff" stroke-width="2"/>
  <text x="480" y="508" text-anchor="middle" fill="#0f172a" font-size="24" font-weight="700">2. 소셜 서버에서 인증</text>
  <text x="480" y="536" text-anchor="middle" fill="#334155" font-size="15">사용자를 확인하고 로그인 토큰을 발급</text>
  <line x1="480" y1="558" x2="480" y2="612" stroke="#9333ea" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="78" y="640" width="240" height="116" rx="30" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="198" y="686" text-anchor="middle" fill="#0f172a" font-size="21" font-weight="700">카카오</text>
  <text x="198" y="716" text-anchor="middle" fill="#92400e" font-size="15">카카오 계정 인증 완료</text>
  <rect x="360" y="640" width="240" height="116" rx="30" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="480" y="686" text-anchor="middle" fill="#0f172a" font-size="21" font-weight="700">구글</text>
  <text x="480" y="716" text-anchor="middle" fill="#475569" font-size="15">구글 계정 인증 완료</text>
  <rect x="642" y="640" width="240" height="116" rx="30" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="762" y="686" text-anchor="middle" fill="#0f172a" font-size="21" font-weight="700">네이버</text>
  <text x="762" y="716" text-anchor="middle" fill="#166534" font-size="15">네이버 계정 인증 완료</text>

  <line x1="198" y1="756" x2="392" y2="836" stroke="#a855f7" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="480" y1="756" x2="480" y2="836" stroke="#9333ea" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="762" y1="756" x2="568" y2="836" stroke="#a855f7" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="628" y="804" fill="#7e22ce" font-size="14" font-weight="700">인증 결과를 세션으로 저장</text>

  <rect x="232" y="852" width="496" height="110" rx="32" fill="#7c3aed"/>
  <text x="480" y="898" text-anchor="middle" fill="#ffffff" font-size="25" font-weight="700">3. 로그인 상태 저장 후 완료</text>
  <text x="480" y="929" text-anchor="middle" fill="#ede9fe" font-size="16">다음 실행 시 자동 로그인 유지</text>

  <rect x="110" y="972" width="740" height="40" rx="20" fill="#f3e8ff"/>
  <text x="480" y="998" text-anchor="middle" fill="#7e22ce" font-size="15" font-weight="700">BusETA 발표용 디자인 | 인증 흐름과 세션 유지 강조</text>
</svg>
</body>
</html>
